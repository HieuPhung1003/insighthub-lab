apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-readonly
  labels:
    app.kubernetes.io/part-of: insighthub
    app.kubernetes.io/managed-by: trainer
  annotations:
    description: "Bind ClusterRole mcp-readonly → ServiceAccount mcp-readonly/insighthub"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-readonly
subjects:
  - kind: ServiceAccount
    name: mcp-readonly
    namespace: insighthub
