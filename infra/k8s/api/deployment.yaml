apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: insighthub-dev
  labels:
    app: api
    version: "${IMAGE_TAG}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ${IMAGE}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: insighthub-db
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: EMBEDDING_PROVIDER
              value: "gemini"
            - name: LLM_PROVIDER
              value: "gemini"
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
