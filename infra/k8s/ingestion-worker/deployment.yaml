apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-worker
  namespace: insighthub-dev
  labels:
    app: ingestion-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-worker
  template:
    metadata:
      labels:
        app: ingestion-worker
    spec:
      containers:
        - name: ingestion-worker
          image: ${IMAGE}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: insighthub-db
                  key: DATABASE_URL
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: EMBEDDING_PROVIDER
              value: "gemini"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
