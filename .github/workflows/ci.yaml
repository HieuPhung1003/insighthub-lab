name: CI/CD — InsightHub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

# Minimal default permissions; jobs opt in to what they need
permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────── #
  # BUILD — matrix across 3 services, push to GHCR, layer cache via GHA #
  # ──────────────────────────────────────────────────────────────────── #
  build:
    name: Build — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    strategy:
      fail-fast: false  # one service failure doesn't cancel the others
      matrix:
        service:
          - name: api
            context: api
            dockerfile: api/Dockerfile
          - name: web
            context: web
            dockerfile: web/Dockerfile
          - name: ingestion-worker
            context: .                           # root context: copies api/app + worker/
            dockerfile: ingestion-worker/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name (lowercase)
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${REPO}/${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          provenance: false

  # ──────────────────────────────────────────────────────────────────── #
  # TEST — lint + unit tests; runs in parallel after build               #
  # ──────────────────────────────────────────────────────────────────── #
  test-python:
    name: Test — api & ingestion-worker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install runtime + test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx ruff

      - name: Ruff lint — api/app
        run: ruff check api/app/

      - name: Ruff lint — ingestion-worker/worker
        run: ruff check ingestion-worker/worker/

      - name: Unit tests — api
        working-directory: api
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379"
        run: pytest tests/ -v -x --tb=short

  test-web:
    name: Test — web
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────── #
  # SCAN — Trivy image scan (matrix) + Checkov IaC scan (parallel)      #
  # ──────────────────────────────────────────────────────────────────── #
  scan-images:
    name: Trivy — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'   # images are only pushed on non-PR
    permissions:
      contents: read
      packages: read
      security-events: write   # upload SARIF to GitHub Security tab
    strategy:
      fail-fast: false
      matrix:
        service: [api, web, ingestion-worker]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image ref
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${REPO}/${{ matrix.service }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL   # HIGH produces too much noise from base images in a lab

  scan-infra:
    name: Checkov — infra/terraform
    runs-on: ubuntu-latest
    # Does not need build — scans HCL source, not images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: false
          output_format: cli

  # ──────────────────────────────────────────────────────────────────── #
  # DEPLOY — EKS namespace insighthub-dev, main branch only             #
  # Required secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY          #
  # ──────────────────────────────────────────────────────────────────── #
  deploy:
    name: Deploy → EKS / insighthub-dev
    runs-on: ubuntu-latest
    needs: [test-python, test-web, scan-images, scan-infra]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production   # enables required reviewers / deployment protection rules
    permissions:
      contents: read
      id-token: write   # ready for OIDC role assumption (Day 6 upgrade)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Update kubeconfig for EKS
        run: aws eks update-kubeconfig --region ap-southeast-1 --name insighthub

      - name: Sync DB credentials from Secrets Manager → K8s Secret
        # Pulls the live password from AWS; --dry-run=client | apply = idempotent upsert
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id insighthub/db \
            --query SecretString \
            --output text)
          DB_HOST=$(echo "$SECRET" | jq -r .host)
          DB_USER=$(echo "$SECRET" | jq -r .username)
          DB_PASS=$(echo "$SECRET" | jq -r .password)
          DB_NAME=$(echo "$SECRET" | jq -r .dbname)

          kubectl create secret generic insighthub-db \
            --from-literal=DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/${DB_NAME}" \
            --namespace insighthub-dev \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy services
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_REPO="ghcr.io/${REPO}"

          # Redis (in-cluster) — idempotent
          kubectl apply -f infra/k8s/redis.yaml

          # Apply each service: expand ${IMAGE} placeholder then kubectl apply
          for svc in api web ingestion-worker; do
            export IMAGE="${IMAGE_REPO}/${svc}:${IMAGE_TAG}"
            envsubst '${IMAGE}' < "infra/k8s/${svc}/deployment.yaml" | kubectl apply -f -
            if [[ -f "infra/k8s/${svc}/service.yaml" ]]; then
              kubectl apply -f "infra/k8s/${svc}/service.yaml"
            fi
          done

      - name: Verify rollout
        run: |
          for deploy in api web ingestion-worker; do
            echo "--- rollout: ${deploy} ---"
            kubectl rollout status deployment/${deploy} \
              --namespace insighthub-dev \
              --timeout=5m
          done

      - name: Smoke test — API liveness
        run: |
          # Port-forward for 10 s; fail fast if pod is crashlooping
          kubectl port-forward deployment/api 18000:8000 \
            --namespace insighthub-dev &
          PF_PID=$!
          sleep 4
          curl -sf http://localhost:18000/healthz | jq .
          kill $PF_PID
